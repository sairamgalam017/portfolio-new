<!DOCTYPE html>
<html>

<head>
    <title>Combined List Example</title>
</head>

<body>

    <h2>Unordered List (Fruits)</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>

    <h2>Ordered List (Steps)</h2>
    <ol>
        <li>Wake up</li>
        <li>Brush teeth</li>
        <li>Go to college</li>
    </ol>

    <h2>Definition List (Terms)</h2>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JS</dt>
        <dd>JavaScript for web development</dd>
    </dl>

</body>

</html>
